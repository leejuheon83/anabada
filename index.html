<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나눔마켓 — 우리 회사 물건 나눔</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  @font-face {
    font-family: 'HakgyoansimKkwabaegi';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2402_keris@1.0/TTHakgyoansimKkwabaegiR.woff2') format('woff2');
    font-weight: normal;
    font-style: normal;
    font-display: swap;
  }
  :root {
    --bg: #F0F2F8;
    --surface: #FFFFFF;
    --accent: #0085CD;
    --accent2: #0096D6;
    --dark: #FFFFFF;
    --text-dark: #0F1A5C;
    --mid: #3D4A6B;
    --light: #8B9AB8;
    --border: #D8DCE8;
    --confirmed: #2A7A4A;
    --tag-bg: #E8ECF5;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: 'Pretendard', sans-serif;
    color: var(--text-dark);
    min-height: 100vh;
  }

  /* ─── HEADER ─── */
  header {
    background: var(--dark);
    padding: 0 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
  }
  .logo-img {
    height: 36px;
    width: auto;
    display: block;
  }

  .header-meta {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .user-badge {
    font-size: 13px;
    color: var(--light);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .user-dot {
    width: 8px; height: 8px;
    background: #4ade80;
    border-radius: 50%;
  }

  .btn-post {
    background: var(--accent);
    color: white;
    border: none;
    padding: 9px 20px;
    border-radius: 4px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Pretendard', sans-serif;
    transition: background 0.2s;
    letter-spacing: 0.2px;
  }
  .btn-post:hover { background: #005192; }

  .btn-admin {
    background: none;
    border: 1px solid var(--text-dark);
    color: var(--text-dark);
    padding: 8px 16px;
    border-radius: 4px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Pretendard', sans-serif;
    transition: all 0.15s;
  }
  .btn-admin:hover {
    background: var(--text-dark);
    color: white;
  }

  /* ─── HERO STRIP ─── */
  .hero-strip {
    background: #0085CD;
    padding: 28px 40px;
    display: flex;
    align-items: flex-end;
    gap: 24px;
    position: relative;
    overflow: hidden;
  }

  .hero-strip::before {
    content: '';
    position: absolute;
    right: -20px;
    top: -30px;
    font-family: 'Nanum Myeongjo', serif;
    font-size: 140px;
    font-weight: 800;
    color: rgba(255,255,255,0.07);
    line-height: 1;
    pointer-events: none;
  }

  .hero-title {
    font-family: 'HakgyoansimKkwabaegi', 'Pretendard', sans-serif;
    font-size: 42px;
    font-weight: normal;
    color: white;
    line-height: 1.1;
  }
  .hero-sub {
    font-size: 13px;
    color: rgba(255,255,255,0.7);
    line-height: 1.6;
    max-width: 320px;
  }

  .hero-stats {
    margin-left: auto;
    display: flex;
    gap: 32px;
  }

  .stat {
    text-align: center;
    color: white;
  }
  .stat-num {
    font-family: 'Nanum Myeongjo', serif;
    font-size: 28px;
    font-weight: 700;
    display: block;
  }
  .stat-label {
    font-size: 11px;
    color: rgba(255,255,255,0.6);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* ─── FILTER BAR ─── */
  .filter-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 40px;
    display: flex;
    align-items: center;
    gap: 4px;
    height: 48px;
  }

  .filter-btn {
    background: none;
    border: none;
    padding: 6px 14px;
    font-size: 13px;
    font-family: 'Pretendard', sans-serif;
    color: var(--mid);
    cursor: pointer;
    border-radius: 20px;
    transition: all 0.15s;
    font-weight: 500;
  }
  .filter-btn:hover { background: var(--tag-bg); color: var(--text-dark); }
  .filter-btn.active {
    background: var(--text-dark);
    color: white;
  }

  /* ─── MAIN GRID ─── */
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 36px 40px;
  }

  .section-header {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 24px;
  }

  .section-title {
    font-family: 'Nanum Myeongjo', serif;
    font-size: 20px;
    font-weight: 700;
  }

  .section-count {
    font-size: 13px;
    color: var(--light);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px;
  }

  /* ─── CARD ─── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    animation: fadeUp 0.4s ease both;
  }
  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 32px rgba(15,26,92,0.12);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card:nth-child(2) { animation-delay: 0.05s; }
  .card:nth-child(3) { animation-delay: 0.10s; }
  .card:nth-child(4) { animation-delay: 0.15s; }
  .card:nth-child(5) { animation-delay: 0.20s; }
  .card:nth-child(6) { animation-delay: 0.25s; }

  .card-img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    display: block;
    background: var(--tag-bg);
    position: relative;
  }

  .card-img-placeholder {
    width: 100%;
    height: 180px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    background: var(--tag-bg);
  }

  .card-status {
    position: absolute;
    top: 12px;
    left: 12px;
  }

  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }
  .status-badge.available {
    background: var(--text-dark);
    color: white;
  }
  .status-badge.pending {
    background: var(--accent2);
    color: white;
  }
  .status-badge.confirmed {
    background: var(--confirmed);
    color: white;
  }

  .card-body {
    padding: 18px 20px;
  }

  .card-category {
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .card-title {
    font-family: 'Nanum Myeongjo', serif;
    font-size: 17px;
    font-weight: 700;
    line-height: 1.35;
    margin-bottom: 8px;
  }

  .card-desc {
    font-size: 13px;
    color: var(--mid);
    line-height: 1.55;
    margin-bottom: 14px;
  }

  .card-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    color: var(--light);
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }

  .card-poster {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .avatar {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--text-dark);
    color: white;
    font-size: 10px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .comment-count {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* ─── MODAL ─── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(15,26,92,0.6);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(4px);
    animation: fadeIn 0.2s ease;
  }

  .modal-overlay.open { display: flex; }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  .modal {
    background: var(--surface);
    border-radius: 12px;
    width: 100%;
    max-width: 680px;
    max-height: 90vh;
    overflow-y: auto;
    animation: slideUp 0.25s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
  }

  .modal-img-placeholder {
    width: 100%;
    height: 240px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 72px;
    background: var(--tag-bg);
    border-radius: 12px 12px 0 0;
  }

  .modal-content {
    padding: 28px 32px 32px;
  }

  .modal-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .modal-category {
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .modal-title {
    font-family: 'Nanum Myeongjo', serif;
    font-size: 26px;
    font-weight: 800;
    line-height: 1.2;
  }

  .modal-close {
    background: none;
    border: none;
    font-size: 24px;
    cursor: pointer;
    color: var(--light);
    line-height: 1;
    padding: 4px;
    margin-top: -4px;
  }
  .modal-close:hover { color: var(--text-dark); }

  .modal-top-actions {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .modal-desc {
    font-size: 14px;
    color: var(--mid);
    line-height: 1.7;
    margin-bottom: 20px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .modal-info-row {
    display: flex;
    gap: 24px;
    margin-bottom: 24px;
  }

  .modal-info-item {
    font-size: 12px;
    color: var(--light);
  }
  .modal-info-item strong {
    display: block;
    font-size: 13px;
    color: var(--text-dark);
    font-weight: 600;
    margin-bottom: 2px;
  }

  /* ─── COMMENTS ─── */
  .comments-section { }

  .comments-title {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .comments-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 16px;
  }

  .comment {
    background: var(--bg);
    border-radius: 8px;
    padding: 14px 16px;
    border: 1px solid var(--border);
    position: relative;
  }

  .comment.confirmed-comment {
    border-color: var(--confirmed);
    background: #f0faf4;
  }

  .comment-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .comment-author {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 600;
  }

  .comment-time {
    font-size: 11px;
    color: var(--light);
  }

  .comment-text {
    font-size: 13px;
    color: var(--mid);
    line-height: 1.55;
  }

  .confirm-badge {
    position: absolute;
    top: 12px;
    right: 12px;
    background: var(--confirmed);
    color: white;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 10px;
    letter-spacing: 0.5px;
  }

  .btn-confirm {
    background: none;
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 11px;
    cursor: pointer;
    color: var(--mid);
    font-family: 'Pretendard', sans-serif;
    transition: all 0.15s;
  }
  .btn-confirm:hover {
    border-color: var(--confirmed);
    color: var(--confirmed);
    background: #f0faf4;
  }
  .btn-confirm.confirmed-btn {
    border-color: var(--confirmed);
    background: var(--confirmed);
    color: white;
  }

  .btn-delete {
    background: none;
    border: 1px solid #dc2626;
    color: #dc2626;
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Pretendard', sans-serif;
    transition: all 0.15s;
  }
  .btn-delete:hover {
    background: #dc2626;
    color: white;
  }

  .btn-edit {
    background: none;
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Pretendard', sans-serif;
    transition: all 0.15s;
  }
  .btn-edit:hover {
    background: var(--accent);
    color: white;
  }

  /* ─── COMMENT INPUT ─── */
  .comment-input-area {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .comment-input-row {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .comment-name-input {
    width: 100%;
    max-width: 140px;
  }

  .comment-input {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    font-family: 'Pretendard', sans-serif;
    background: white;
    resize: none;
    outline: none;
    transition: border-color 0.15s;
    color: var(--text-dark);
  }
  .comment-input:focus { border-color: var(--text-dark); }

  .btn-send {
    background: var(--text-dark);
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Pretendard', sans-serif;
    white-space: nowrap;
    transition: background 0.15s;
  }
  .btn-send:hover { background: var(--accent); }

  /* ─── POST MODAL ─── */
  .post-modal {
    background: var(--surface);
    border-radius: 12px;
    width: 100%;
    max-width: 520px;
    padding: 32px;
    animation: slideUp 0.25s ease;
  }

  .post-modal-title {
    font-family: 'Nanum Myeongjo', serif;
    font-size: 22px;
    font-weight: 800;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .form-group {
    margin-bottom: 16px;
  }

  .form-label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    color: var(--mid);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 6px;
  }

  .form-input, .form-select, .form-textarea {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 14px;
    font-family: 'Pretendard', sans-serif;
    background: white;
    color: var(--text-dark);
    outline: none;
    transition: border-color 0.15s;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--text-dark); }

  .form-textarea {
    height: 90px;
    resize: none;
    line-height: 1.6;
  }

  .emoji-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 8px;
    margin-bottom: 4px;
  }

  .emoji-btn {
    background: var(--bg);
    border: 2px solid transparent;
    border-radius: 8px;
    font-size: 24px;
    padding: 8px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
  }
  .emoji-btn:hover { border-color: var(--border); }
  .emoji-btn.selected { border-color: var(--text-dark); background: var(--tag-bg); }

  .btn-submit {
    width: 100%;
    background: var(--accent);
    color: white;
    border: none;
    padding: 13px;
    border-radius: 6px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Pretendard', sans-serif;
    margin-top: 8px;
    transition: background 0.15s;
    letter-spacing: 0.3px;
  }
  .btn-submit:hover { background: #005192; }

  /* ─── TOAST ─── */
  .toast {
    position: fixed;
    bottom: 32px;
    right: 32px;
    background: var(--text-dark);
    color: white;
    padding: 12px 20px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    z-index: 999;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s ease;
  }
  .toast.show {
    transform: translateY(0);
    opacity: 1;
  }

  .card-img-wrap {
    position: relative;
  }

  /* ─── PHOTO UPLOAD ─── */
  .photo-upload-area {
    border: 2px dashed var(--border);
    border-radius: 8px;
    padding: 0;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
    overflow: hidden;
    background: white;
  }
  .photo-upload-area:hover {
    border-color: var(--text-dark);
    background: var(--bg);
  }
  .photo-upload-area.has-image {
    border-style: solid;
    border-color: var(--border);
    padding: 0;
  }

  .photo-upload-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 28px 16px;
    pointer-events: none;
  }

  .photo-upload-icon {
    font-size: 32px;
    opacity: 0.5;
  }

  .photo-upload-text {
    font-size: 13px;
    font-weight: 600;
    color: var(--mid);
  }

  .photo-upload-sub {
    font-size: 11px;
    color: var(--light);
  }

  .photo-preview-wrap {
    position: relative;
    display: none;
  }
  .photo-preview-wrap.visible { display: block; }

  .photo-preview {
    width: 100%;
    height: 200px;
    object-fit: cover;
    display: block;
    border-radius: 6px;
  }

  .photo-preview-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    padding: 8px;
  }

  .photo-thumb-wrap {
    position: relative;
    border-radius: 6px;
    overflow: hidden;
    aspect-ratio: 1;
  }

  .photo-thumb {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .photo-thumb-remove {
    position: absolute;
    top: 4px;
    right: 4px;
    background: rgba(15,26,92,0.7);
    color: white;
    border: none;
    border-radius: 50%;
    width: 22px;
    height: 22px;
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .photo-thumb-remove:hover { background: var(--accent); }

  .photo-add-more {
    aspect-ratio: 1;
    border: 2px dashed var(--border);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    cursor: pointer;
    color: var(--light);
    transition: all 0.15s;
  }
  .photo-add-more:hover { border-color: var(--text-dark); color: var(--text-dark); }

  .card-photo {
    width: 100%;
    height: 180px;
    object-fit: contain;
    background: var(--tag-bg);
    display: block;
  }

  .modal-photo-slider {
    width: 100%;
    height: 260px;
    position: relative;
    overflow: hidden;
    border-radius: 12px 12px 0 0;
    background: var(--tag-bg);
  }

  .modal-photo-slide {
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: var(--tag-bg);
    display: none;
  }
  .modal-photo-slide.active { display: block; }

  .photo-nav {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
  }

  .photo-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.5);
    cursor: pointer;
    transition: background 0.15s;
  }
  .photo-dot.active { background: white; }

  .photo-arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(15,26,92,0.45);
    color: white;
    border: none;
    width: 32px; height: 32px;
    border-radius: 50%;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  const FIREBASE_CONFIG = {
    apiKey: 'AIzaSyAWrnKEvTFaDOVDdIg757TFWsn0MPLe_aA',
    authDomain: 'anabada-f15d5.firebaseapp.com',
    projectId: 'anabada-f15d5',
    storageBucket: 'anabada-f15d5.firebasestorage.app',
    messagingSenderId: '118315973590',
    appId: '1:118315973590:web:7269d06ea6e580d53b0277'
  };

  const STORAGE_KEY = 'nanum-market-items';
  const MY_POSTS_KEY = 'nanum-market-my-posts';
  const ADMIN_SESSION_KEY = 'nanum-market-admin';
  const ADMIN_ID = 'admin';
  const ADMIN_PW = 'admin';
  const EMOJIS = ['💻','🖥️','⌨️','🖱️','📱','🎧','📷','🔌','💡','🪑','🗄️','📦','✏️','📋','🗂️','🔧','📚','🖨️','🎒','☕','🧊','🪴'];
  const MAX_PHOTOS = 5;
  const DESC_PREVIEW_LEN = 60;
  const FIRESTORE_COLLECTION = 'items';
  const STORAGE_BUCKET_PATH = 'item-photos';

  let uploadedPhotos = [];
  let currentSlideIndex = 0;
  let currentItemId = null;
  let editItemId = null;
  let selectedEmoji = '📦';
  let db = null;
  let storage = null;
  let useFirebase = false;

  let items = [];
  let currentFilter = 'all';
  const isLocalHost = () => location.hostname === 'localhost' || location.hostname === '127.0.0.1';

  function initFirebase() {
    if (useFirebase) return true;
    if (!FIREBASE_CONFIG.apiKey || FIREBASE_CONFIG.apiKey === 'YOUR_API_KEY') return false;
    try {
      if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
      db = firebase.firestore();
      storage = firebase.storage();
      useFirebase = true;
      return true;
    } catch (e) {
      console.warn('Firebase init failed:', e);
      return false;
    }
  }

  function loadItems() {
    if (!initFirebase()) {
      items = [];
      if (!isLocalHost()) {
        showToast('⚠️ Firebase 연결 실패: 다른 기기와 동기화되지 않습니다. 설정을 확인해주세요.');
      }
      renderGrid();
      return items;
    }
    items = [];
    db.collection(FIRESTORE_COLLECTION).orderBy('createdAt', 'desc').onSnapshot(snapshot => {
      items = snapshot.docs.map(doc => {
        const d = doc.data();
        return { id: doc.id, ...d, comments: d.comments || [] };
      });
      renderGrid();
      if (currentItemId) {
        const item = items.find(i => String(i.id) === String(currentItemId));
        if (item) renderComments(item);
      }
    }, err => {
      console.warn('Firestore error:', err);
      const msg = err.code === 'permission-denied'
        ? '⚠️ Firestore 읽기 권한이 없습니다. Firebase 콘솔에서 보안 규칙을 설정해주세요.'
        : '⚠️ 데이터를 불러오는 중 오류가 발생했습니다.';
      showToast(msg);
    });
    return items;
  }

  async function saveItems() {
    if (!useFirebase) return;
  }

  async function uploadPhotosToStorage(itemId, photosToUpload) {
    const base64List = (photosToUpload || uploadedPhotos).filter(p => typeof p === 'string' && p.startsWith('data:'));
    if (!storage || base64List.length === 0) return null;
    const urls = [];
    for (let i = 0; i < base64List.length; i++) {
      const ref = storage.ref().child(`${STORAGE_BUCKET_PATH}/${itemId}/${Date.now()}_${i}.jpg`);
      const blob = await (await fetch(base64List[i])).blob();
      await ref.put(blob);
      urls.push(await ref.getDownloadURL());
    }
    return urls;
  }

  function toFirestoreItem(item) {
    const { id, ...data } = item;
    return {
      ...data,
      comments: data.comments || [],
      photos: data.photos || null
    };
  }

  function getStatusLabel(status) {
    const map = { available: { text: '나눔중', cls: 'available' }, pending: { text: '나눔중', cls: 'available' }, confirmed: { text: '확정완료', cls: 'confirmed' } };
    return map[status] || map.available;
  }

  function truncateDesc(desc) {
    if (!desc) return '';
    return desc.length <= DESC_PREVIEW_LEN ? desc : desc.slice(0, DESC_PREVIEW_LEN) + '…';
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function getFilteredItems() {
    if (currentFilter === 'all') return items;
    if (currentFilter === 'available') return items.filter(i => i.status === 'available' || i.status === 'pending');
    if (currentFilter === 'confirmed') return items.filter(i => i.status === 'confirmed');
    return items;
  }

  function renderGrid() {
    const filtered = getFilteredItems();
    const grid = document.getElementById('itemGrid');

    document.getElementById('gridCount').textContent = filtered.length + '개';
    updateStats();

    if (filtered.length === 0) {
      grid.innerHTML = '<div class="no-items">해당 조건의 물건이 없습니다.</div>';
      return;
    }

    grid.innerHTML = filtered.map((item, i) => {
      const s = getStatusLabel(item.status);
      const imgHtml = item.photos && item.photos.length > 0
        ? `<img class="card-photo" src="${item.photos[0]}" alt="${escapeHtml(item.title)}">`
        : `<div class="card-img-placeholder">${escapeHtml(item.emoji)}</div>`;
      return `
      <div class="card" data-id="${item.id}" style="animation-delay:${i * 0.05}s" role="button" tabindex="0">
        <div class="card-img-wrap">
          ${imgHtml}
          <div class="card-status">
            <span class="status-badge ${s.cls}">${s.text}</span>
          </div>
        </div>
        <div class="card-body">
          <div class="card-title">${escapeHtml(item.title)}</div>
          <div class="card-desc">${escapeHtml(truncateDesc(item.desc))}</div>
          <div class="card-meta">
            <div class="card-poster">
              <div class="avatar">${escapeHtml(item.poster[0] || '?')}</div>
              <span>${escapeHtml(item.poster)}${item.dept ? ' · ' + escapeHtml(item.dept) : ''}</span>
            </div>
            <div class="comment-count">💬 ${item.comments ? item.comments.length : 0}</div>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  function updateStats() {
    document.getElementById('totalCount').textContent = items.length;
    document.getElementById('availableCount').textContent = items.filter(i => i.status === 'available' || i.status === 'pending').length;
    document.getElementById('confirmedCount').textContent = items.filter(i => i.status === 'confirmed').length;
  }

  function filterItems(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === f));
    renderGrid();
  }

  function openDetail(id) {
    const item = items.find(i => String(i.id) === String(id));
    if (!item) return;
    currentItemId = id;
    currentSlideIndex = 0;

    const imageArea = document.getElementById('modalImageArea');
    if (item.photos && item.photos.length > 0) {
      const dots = item.photos.map((_, i) =>
        `<div class="photo-dot ${i === 0 ? 'active' : ''}" data-slide="${i}"></div>`
      ).join('');
      const arrows = item.photos.length > 1
        ? `<button class="photo-arrow left" data-dir="-1">‹</button>
           <button class="photo-arrow right" data-dir="1">›</button>`
        : '';
      imageArea.innerHTML = `
        <div class="modal-photo-slider" id="modalSlider">
          ${item.photos.map((src, i) =>
            `<img class="modal-photo-slide ${i === 0 ? 'active' : ''}" src="${src}" alt="photo ${i + 1}">`
          ).join('')}
          ${arrows}
          ${item.photos.length > 1 ? `<div class="photo-nav" id="photoDots">${dots}</div>` : ''}
        </div>`;

      imageArea.querySelectorAll('.photo-dot').forEach(d => {
        d.addEventListener('click', () => goSlide(parseInt(d.dataset.slide, 10)));
      });
      imageArea.querySelectorAll('.photo-arrow').forEach(a => {
        a.addEventListener('click', () => goSlide(currentSlideIndex + parseInt(a.dataset.dir, 10)));
      });
    } else {
      imageArea.innerHTML = `<div class="modal-img-placeholder" id="modalEmoji">${escapeHtml(item.emoji)}</div>`;
    }

    document.getElementById('modalTitle').textContent = item.title;
    document.getElementById('modalDesc').textContent = item.desc;
    document.getElementById('modalPoster').textContent = item.dept ? item.poster + ' · ' + item.dept : item.poster;
    document.getElementById('modalDate').textContent = item.date;

    const s = getStatusLabel(item.status);
    document.getElementById('modalStatus').textContent = s.text;

    const myPosts = JSON.parse(localStorage.getItem(MY_POSTS_KEY) || '[]');
    const amIPoster = myPosts.includes(item.id);
    const isAdmin = isAdminLoggedIn();
    document.getElementById('modalEditBtn').style.display = isAdmin ? 'block' : 'none';
    document.getElementById('modalDeleteBtn').style.display = isAdmin ? 'block' : 'none';

    renderComments(item);

    const inputArea = document.getElementById('commentInputArea');
    inputArea.style.display = item.status === 'confirmed' ? 'none' : 'flex';

    document.getElementById('detailModal').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function goSlide(idx) {
    const item = items.find(i => String(i.id) === String(currentItemId));
    if (!item || !item.photos) return;
    const len = item.photos.length;
    currentSlideIndex = ((idx % len) + len) % len;
    const slider = document.getElementById('modalSlider');
    if (!slider) return;
    const slides = slider.querySelectorAll('.modal-photo-slide');
    const dots = slider.querySelectorAll('.photo-dot');
    slides.forEach((s, i) => s.classList.toggle('active', i === currentSlideIndex));
    dots.forEach((d, i) => d.classList.toggle('active', i === currentSlideIndex));
  }

  function renderComments(item) {
    const list = document.getElementById('commentsList');
    const label = document.getElementById('commentCountLabel');
    const comments = item.comments || [];
    label.textContent = comments.length > 0 ? `(${comments.length}개)` : '';

    if (comments.length === 0) {
      list.innerHTML = '<div style="font-size:13px;color:var(--light);padding:16px 0;">아직 신청 댓글이 없어요. 첫 번째로 신청해보세요!</div>';
      return;
    }

    const myPosts = JSON.parse(localStorage.getItem(MY_POSTS_KEY) || '[]');
    const amIPoster = myPosts.includes(item.id);
    const adminLoggedIn = sessionStorage.getItem(ADMIN_SESSION_KEY) === 'true';
    const canConfirm = (amIPoster || adminLoggedIn) && item.status !== 'confirmed';
    list.innerHTML = comments.map(c => {
      const isConfirmed = c.confirmed;
      return `
      <div class="comment ${isConfirmed ? 'confirmed-comment' : ''}">
        ${isConfirmed ? '<div class="confirm-badge">✓ 확정</div>' : ''}
        <div class="comment-header">
          <div class="comment-author">
            <div class="avatar" style="background:${hashColor(c.author)}">${escapeHtml(c.author[0] || '?')}</div>
            <span>${escapeHtml(c.author)}${c.dept ? ' · ' + escapeHtml(c.dept) : ''}</span>
          </div>
          <div style="display:flex;align-items:center;gap:8px;">
            <span class="comment-time">${escapeHtml(c.time)}</span>
            ${canConfirm
              ? `<button class="btn-confirm" data-item="${item.id}" data-comment="${c.id}">수령자 확정</button>`
              : ''}
          </div>
        </div>
        <div class="comment-text">${escapeHtml(c.text)}</div>
      </div>`;
    }).join('');

    list.querySelectorAll('.btn-confirm').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        confirmComment(parseInt(btn.dataset.item, 10), parseInt(btn.dataset.comment, 10));
      });
    });
  }

  function hashColor(name) {
    const colors = ['#0085CD','#2A7A4A','#005192','#0096D6','#7C3AED','#0F1A5C'];
    let hash = 0;
    for (let i = 0; i < (name || '').length; i++) hash = (name || '').charCodeAt(i) + ((hash << 5) - hash);
    return colors[Math.abs(hash) % colors.length];
  }

  async function confirmComment(itemId, commentId) {
    const item = items.find(i => String(i.id) === String(itemId));
    if (!item) return;

    item.comments.forEach(c => { c.confirmed = false; });
    const comment = item.comments.find(c => c.id === commentId);
    if (comment) {
      comment.confirmed = true;
      item.status = 'confirmed';
    }

    if (!useFirebase) {
      showToast('⚠️ Firebase 미연결 상태입니다. 새로고침 후 다시 시도해주세요.');
      return;
    }
    await db.collection(FIRESTORE_COLLECTION).doc(String(itemId)).update({
      comments: item.comments,
      status: 'confirmed'
    });
    renderComments(item);
    document.getElementById('commentInputArea').style.display = 'none';
    document.getElementById('modalStatus').textContent = '확정완료';
    renderGrid();
    showToast(`🎉 ${comment.author}님이 수령자로 확정되었습니다!`);
  }

  async function submitComment() {
    const input = document.getElementById('commentInput');
    const nameInput = document.getElementById('commentAuthorName');
    const text = input.value.trim();
    const author = nameInput.value.trim();
    if (!text) { showToast('⚠️ 댓글 내용을 입력해주세요.'); return; }
    if (!author) { showToast('⚠️ 이름을 입력해주세요.'); return; }

    const item = items.find(i => String(i.id) === String(currentItemId));
    if (!item) return;

    const now = new Date();
    const time = `${now.getMonth() + 1}.${now.getDate()} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;

    if (!item.comments) item.comments = [];
    item.comments.push({
      id: Date.now(),
      author,
      dept: '',
      text,
      time,
      confirmed: false,
    });

    if (item.status === 'available') item.status = 'pending';

    if (!useFirebase) {
      showToast('⚠️ Firebase 미연결 상태입니다. 새로고침 후 다시 시도해주세요.');
      return;
    }
    await db.collection(FIRESTORE_COLLECTION).doc(String(currentItemId)).update({
      comments: item.comments,
      status: item.status
    });
    input.value = '';
    renderComments(item);
    renderGrid();
    showToast('댓글이 등록되었습니다 ✓');
  }

  function closeModal() {
    document.getElementById('detailModal').classList.remove('open');
    document.body.style.overflow = '';
  }

  function isAdminLoggedIn() {
    return sessionStorage.getItem(ADMIN_SESSION_KEY) === 'true';
  }

  function toggleAdminUI() {
    if (isAdminLoggedIn()) {
      doLogout();
    } else {
      openLoginModal();
    }
  }

  function openLoginModal() {
    document.getElementById('loginId').value = '';
    document.getElementById('loginPw').value = '';
    document.getElementById('loginModal').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLoginModal() {
    document.getElementById('loginModal').classList.remove('open');
    document.body.style.overflow = '';
  }

  function doLogin() {
    const id = document.getElementById('loginId').value.trim();
    const pw = document.getElementById('loginPw').value;
    if (id !== ADMIN_ID || pw !== ADMIN_PW) {
      showToast('⚠️ 아이디 또는 비밀번호가 올바르지 않습니다.');
      return;
    }
    sessionStorage.setItem(ADMIN_SESSION_KEY, 'true');
    closeLoginModal();
    updateAdminButton();
    refreshModalIfOpen();
    showToast('관리자로 로그인되었습니다.');
  }

  function doLogout() {
    sessionStorage.removeItem(ADMIN_SESSION_KEY);
    updateAdminButton();
    refreshModalIfOpen();
    showToast('로그아웃되었습니다.');
  }

  function updateAdminButton() {
    const btn = document.getElementById('adminBtn');
    btn.textContent = isAdminLoggedIn() ? '로그아웃' : '관리자';
    document.getElementById('postBtn').style.display = 'block';
  }

  function refreshModalIfOpen() {
    if (currentItemId) {
      const item = items.find(i => String(i.id) === String(currentItemId));
      if (item) {
        const myPosts = JSON.parse(localStorage.getItem(MY_POSTS_KEY) || '[]');
        const amIPoster = myPosts.includes(item.id);
        const isAdmin = isAdminLoggedIn();
        document.getElementById('modalEditBtn').style.display = isAdmin ? 'block' : 'none';
        document.getElementById('modalDeleteBtn').style.display = isAdmin ? 'block' : 'none';
        renderComments(item);
      }
    }
  }

  async function deleteItem() {
    if (!isAdminLoggedIn()) { showToast('⚠️ 관리자만 삭제할 수 있습니다.'); return; }
    if (!currentItemId) return;
    if (!confirm('이 물건을 삭제하시겠습니까?')) return;

    if (!useFirebase) {
      showToast('⚠️ Firebase 미연결 상태입니다. 새로고침 후 다시 시도해주세요.');
      return;
    }
    await db.collection(FIRESTORE_COLLECTION).doc(String(currentItemId)).delete();

    const myPosts = JSON.parse(localStorage.getItem(MY_POSTS_KEY) || '[]');
    const newMyPosts = myPosts.filter(id => String(id) !== String(currentItemId));
    localStorage.setItem(MY_POSTS_KEY, JSON.stringify(newMyPosts));

    closeModal();
    currentItemId = null;
    renderGrid();
    showToast('물건이 삭제되었습니다.');
  }

  function handlePhotoUpload(event) {
    const files = Array.from(event.target.files || []).filter(f => f.type.startsWith('image/'));
    const remaining = MAX_PHOTOS - uploadedPhotos.length;
    if (remaining <= 0) { showToast('⚠️ 사진은 최대 5장까지 등록할 수 있어요.'); return; }
    const toProcess = files.slice(0, remaining);
    if (toProcess.length === 0) return;

    let loaded = 0;
    toProcess.forEach(file => {
      const reader = new FileReader();
      reader.onload = (e) => {
        uploadedPhotos.push(e.target.result);
        loaded++;
        if (loaded === toProcess.length) renderPhotoPreview();
      };
      reader.readAsDataURL(file);
    });
    event.target.value = '';
  }

  function removePhoto(idx) {
    uploadedPhotos.splice(idx, 1);
    renderPhotoPreview();
  }

  function renderPhotoPreview() {
    const grid = document.getElementById('photoPreviewGrid');
    const inner = document.getElementById('photoUploadInner');

    if (uploadedPhotos.length === 0) {
      grid.style.display = 'none';
      inner.style.display = 'flex';
      return;
    }

    inner.style.display = 'none';
    grid.style.display = 'grid';
    grid.innerHTML = uploadedPhotos.map((src, i) => `
      <div class="photo-thumb-wrap">
        <img class="photo-thumb" src="${src}" alt="photo ${i + 1}">
        <button class="photo-thumb-remove" type="button" data-idx="${i}">✕</button>
      </div>
    `).join('') + (uploadedPhotos.length < MAX_PHOTOS
      ? `<div class="photo-add-more" id="photoAddMore">+</div>`
      : '');

    grid.querySelectorAll('.photo-thumb-remove').forEach(btn => {
      btn.addEventListener('click', (e) => { e.stopPropagation(); removePhoto(parseInt(btn.dataset.idx, 10)); });
    });
    const addMore = document.getElementById('photoAddMore');
    if (addMore) addMore.addEventListener('click', (e) => { e.stopPropagation(); document.getElementById('photoFileInput').click(); });
  }

  function openEditModal() {
    if (!isAdminLoggedIn()) { showToast('⚠️ 관리자만 수정할 수 있습니다.'); return; }
    const item = items.find(i => String(i.id) === String(currentItemId));
    if (!item) return;
    editItemId = item.id;
    document.getElementById('postModalTitle').innerHTML = '물건 수정하기<button class="modal-close" onclick="closePostModal()">✕</button>';
    document.getElementById('posterNameGroup').style.display = 'none';
    document.getElementById('newPosterName').value = item.poster;
    document.getElementById('newTitle').value = item.title;
    document.getElementById('newDesc').value = item.desc;
    uploadedPhotos = item.photos ? [...item.photos] : [];
    selectedEmoji = item.emoji || '📦';
    renderPhotoPreview();
    const grid = document.getElementById('emojiGrid');
    grid.innerHTML = EMOJIS.map(e => `
      <button class="emoji-btn ${e === selectedEmoji ? 'selected' : ''}" type="button" data-emoji="${escapeHtml(e)}">${e}</button>
    `).join('');
    grid.querySelectorAll('.emoji-btn').forEach(btn => {
      btn.addEventListener('click', () => { selectEmoji(btn, btn.dataset.emoji); });
    });
    document.getElementById('submitPostBtn').textContent = '수정하기';
    document.getElementById('postModal').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function openPostModal() {
    editItemId = null;
    uploadedPhotos = [];
    selectedEmoji = '📦';
    document.getElementById('postModalTitle').innerHTML = '물건 등록하기<button class="modal-close" onclick="closePostModal()">✕</button>';
    document.getElementById('posterNameGroup').style.display = 'block';
    document.getElementById('newPosterName').value = '';
    document.getElementById('newTitle').value = '';
    document.getElementById('newDesc').value = '';
    renderPhotoPreview();
    const grid = document.getElementById('emojiGrid');
    grid.innerHTML = EMOJIS.map(e => `
      <button class="emoji-btn ${e === selectedEmoji ? 'selected' : ''}" type="button" data-emoji="${escapeHtml(e)}">${e}</button>
    `).join('');
    grid.querySelectorAll('.emoji-btn').forEach(btn => {
      btn.addEventListener('click', () => { selectEmoji(btn, btn.dataset.emoji); });
    });
    document.getElementById('submitPostBtn').textContent = '등록하기';
    document.getElementById('postModal').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function selectEmoji(btn, emoji) {
    selectedEmoji = emoji;
    document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
  }

  function closePostModal() {
    editItemId = null;
    document.getElementById('postModal').classList.remove('open');
    document.body.style.overflow = '';
  }

  async function submitPost() {
    if (!initFirebase()) {
      showToast('⚠️ Firebase 연결 실패: 저장할 수 없습니다. 설정을 확인해주세요.');
      return;
    }
    const posterName = document.getElementById('newPosterName').value.trim();
    const title = document.getElementById('newTitle').value.trim();
    const desc = document.getElementById('newDesc').value.trim();

    if (!editItemId && !posterName) { showToast('⚠️ 등록자 이름을 입력해주세요.'); return; }
    if (!title || !desc) { showToast('⚠️ 물건 이름과 설명을 입력해주세요.'); return; }

    const now = new Date();
    const date = `${now.getFullYear()}.${String(now.getMonth() + 1).padStart(2, '0')}.${String(now.getDate()).padStart(2, '0')}`;

    if (editItemId) {
      const item = items.find(i => String(i.id) === String(editItemId));
      if (!item) return;

      let photoUrls = uploadedPhotos.filter(p => typeof p === 'string' && !p.startsWith('data:'));
      const newBase64 = uploadedPhotos.filter(p => typeof p === 'string' && p.startsWith('data:'));
      if (useFirebase && newBase64.length > 0) {
        const uploaded = await uploadPhotosToStorage(editItemId, newBase64);
        if (uploaded) photoUrls = [...photoUrls, ...uploaded];
      } else if (!useFirebase && uploadedPhotos.length > 0) {
        photoUrls = [...uploadedPhotos];
      }

      const updateData = {
        emoji: selectedEmoji,
        photos: photoUrls.length > 0 ? photoUrls : null,
        title,
        desc
      };

      if (!useFirebase) {
        showToast('⚠️ Firebase 미연결 상태입니다. 새로고침 후 다시 시도해주세요.');
        return;
      }
      await db.collection(FIRESTORE_COLLECTION).doc(String(editItemId)).update(updateData);

      document.getElementById('newPosterName').value = '';
      document.getElementById('newTitle').value = '';
      document.getElementById('newDesc').value = '';
      uploadedPhotos = [];
      closePostModal();
      document.getElementById('submitPostBtn').textContent = '등록하기';
      if (currentItemId === editItemId) {
        document.getElementById('modalTitle').textContent = title;
        document.getElementById('modalDesc').textContent = desc;
      }
      renderGrid();
      showToast('물건이 수정되었습니다.');
      return;
    }

    try {
      const docRef = await db.collection(FIRESTORE_COLLECTION).add({
        emoji: selectedEmoji,
        photos: null,
        title,
        desc,
        poster: posterName,
        dept: '',
        date,
        status: 'available',
        comments: [],
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      const newId = docRef.id;
      let photoUrls = null;
      if (uploadedPhotos.length > 0) {
        try {
          photoUrls = await uploadPhotosToStorage(newId);
          if (photoUrls) await docRef.update({ photos: photoUrls });
        } catch (e) {
          console.warn('Storage upload failed:', e);
          showToast('⚠️ 사진 업로드 실패. Storage 규칙을 확인해주세요.');
        }
      }
      const newItem = {
        id: newId,
        emoji: selectedEmoji,
        photos: photoUrls || null,
        title,
        desc,
        poster: posterName,
        dept: '',
        date,
        status: 'available',
        comments: []
      };
      items.unshift(newItem);
      renderGrid();
      const myPosts = JSON.parse(localStorage.getItem(MY_POSTS_KEY) || '[]');
      myPosts.unshift(newId);
      localStorage.setItem(MY_POSTS_KEY, JSON.stringify(myPosts));
    } catch (e) {
      console.error('Firestore add failed:', e);
      if (e.code === 'permission-denied') {
        showToast('⚠️ Firestore 쓰기 권한이 없습니다. Firebase 콘솔 → Firestore → 규칙에서 allow read, write: if true 설정해주세요.');
      } else {
        showToast('⚠️ 저장 실패: ' + (e.message || '알 수 없는 오류'));
      }
      return;
    }

    document.getElementById('newPosterName').value = '';
    document.getElementById('newTitle').value = '';
    document.getElementById('newDesc').value = '';
    uploadedPhotos = [];
    closePostModal();
    currentFilter = 'all';
    document.querySelectorAll('.filter-btn').forEach((b) => b.classList.toggle('active', (b.dataset.filter || '') === 'all'));
    renderGrid();
    showToast('🎊 물건이 등록되었습니다!');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._toastTimer);
    t._toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
  }

  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
  document.getElementById('postModal').addEventListener('click', function(e) {
    if (e.target === this) closePostModal();
  });
  document.getElementById('loginModal').addEventListener('click', function(e) {
    if (e.target === this) closeLoginModal();
  });

  document.getElementById('filterBar')?.addEventListener('click', (e) => {
    const btn = e.target.closest('.filter-btn[data-filter]');
    if (btn) filterItems(btn.dataset.filter, btn);
  });

  const itemGrid = document.getElementById('itemGrid');
  if (itemGrid) {
    itemGrid.addEventListener('click', (e) => {
      const card = e.target.closest('.card[data-id]');
      if (card) {
        e.preventDefault();
        try {
          openDetail(card.dataset.id);
        } catch (err) {
          console.error('openDetail error:', err);
          showToast('세부보기 열기 실패');
        }
      }
    });
    itemGrid.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        const card = e.target.closest('.card[data-id]');
        if (card) {
          e.preventDefault();
          openDetail(card.dataset.id);
        }
      }
    });
  }

  document.addEventListener('DOMContentLoaded', () => {
    const area = document.getElementById('photoUploadArea');
    const fileInput = document.getElementById('photoFileInput');
    if (!area || !fileInput) return;

    area.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', handlePhotoUpload);

    area.addEventListener('dragover', (e) => { e.preventDefault(); area.style.borderColor = 'var(--text-dark)'; });
    area.addEventListener('dragleave', () => { area.style.borderColor = ''; });
    area.addEventListener('drop', (e) => {
      e.preventDefault();
      area.style.borderColor = '';
      const files = Array.from(e.dataTransfer.files || []).filter(f => f.type.startsWith('image/'));
      if (!files.length) return;
      const remaining = MAX_PHOTOS - uploadedPhotos.length;
      const toProcess = files.slice(0, remaining);
      let loaded = 0;
      toProcess.forEach(file => {
        const reader = new FileReader();
        reader.onload = (ev) => {
          uploadedPhotos.push(ev.target.result);
          loaded++;
          if (loaded === toProcess.length) renderPhotoPreview();
        };
        reader.readAsDataURL(file);
      });
    });
  });

  document.getElementById('commentInput')?.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submitComment(); }
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      if (document.getElementById('detailModal').classList.contains('open')) closeModal();
      if (document.getElementById('postModal').classList.contains('open')) closePostModal();
    }
  });

  loadItems();
  renderGrid();
  updateAdminButton();

  setTimeout(() => {
    if (!useFirebase && !location.hostname.includes('localhost') && !location.hostname.includes('127.0.0.1')) {
      showToast('⚠️ Firebase 미연결. Firebase 콘솔 → Authentication → 인증된 도메인에 이 사이트 주소를 추가해주세요.');
    }
  }, 2000);

  document.getElementById('loginPw')?.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });
</script>
</body>
</html>
